<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- checkbox, check_radio, button  -->
    <div class="test">
        <div class="checkbox">
            <input type="checkbox" id="checkbox__input" class="checkbox__input">
            <label for="checkbox__input" class="checkbox__label">Nhấn vào đây coi có gì vui nè!!!!</label>
        </div>
    
        <div class="radio">
            <input type="radio" id="radio__input" class="radio__input">
            <label for="radio__input" class="radio__label">fasdhfkjlhaskjdfhk</label>
        </div>
    
        <div class="checkbox2">
            <input type="checkbox" id="checkbox2__input" class="checkbox2__input">
            <label for="checkbox2__input" class="checkbox2__label">
                <div class="checkbox2__label__circle"></div>
            </label>
        </div>
    
        <button class="button">BUTTON</button>
    </div>
    <!-- form -->
    <div class="windown">
        <div class="windown_heading">
            <h1 class="windown_register">Register</h1>
            <div class="windown_container">
                <div class="windown_input_full">
                    <input type="text" class="windown_input" placeholder="Username" id="username">
                    <span></span>
                </div>

                <div class="windown_input_full">
                    <input type="email" class="windown_input" placeholder="Gmail" required>
                    <span></span>
                </div>

                <div class="windown_input_full">
                    <input type="password" class="windown_input" placeholder="Password" required>
                    <span></span>
                </div>

                <div class="windown_input_full">
                    <input type="password" class="windown_input" placeholder="Confirm password" required>
                    <span></span>
                </div>
                <button class="windown_login" type="submit">Login</button>
                <p class="windown_footer">Not a member? <a href="#">Signup</a></p>
            </div>
        </div>
    </div>

    <!-- loading -->
    <div class="loading">
        <div style="--value: 1"></div>
        <div style="--value: 2"></div>
        <div style="--value: 3"></div>
        <div style="--value: 4"></div>
        <div style="--value: 5"></div>
        <div style="--value: 6"></div>
        <div style="--value: 7"></div>
        <div style="--value: 8"></div>
    </div>

    <!-- video -->
    <div class="media">
        <iframe width="664" height="498" src="https://www.youtube.com/embed/xypzmu5mMPY" title="SƠN TÙNG M-TP | MUỘN RỒI MÀ SAO CÒN | OFFICIAL MUSIC VIDEO" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <!-- form  -->
    <div class="test2">
        <div class="container">
            <h1 class="container_heading">Create Account</h1>
            <div class="container_icon">
                <i class="fab fa-google-plus"></i>
                <i class="fab fa-facebook"></i>
                <i class="fab fa-twitter"></i>
            </div>
            <p class="container_secondary">or use your email for registration</p>
            <div class="container_primary">
                <input type="text" class="heading_name" placeholder="Name">
                <input type="email" class="heading_gmail" placeholder="Gamil">
                <input type="password" class="heading_password" placeholder="Password">
                <div class="footer_check">
                    <input type="checkbox" class="heading_check" id="heading_check">
                    <label for="heading_check" class="check_label">I agree to the <a href="#">Teams</a> and <a href="#">Privacy Policy</a></label>
                </div>
                <div class="heading_btt">
                    <button class="signup">Sing Up</button>
                    <button class="signin">Sing In</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
